<!DOCTYPE html>
<html>
<head>
    <title>Мой супер калькулятор</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; }
        input { padding: 10px; font-size: 16px; width: 80px; text-align: center; margin: 5px; }
        .buttons { margin-top: 15px; }
        button { padding: 10px 15px; font-size: 18px; cursor: pointer; margin: 5px; border: none; border-radius: 4px; color: white; min-width: 45px; }
        .btn-plus { background-color: #28a745; }
        .btn-minus { background-color: #dc3545; }
        .btn-multiply { background-color: #ffc107; color: black; }
        .btn-divide { background-color: #17a2b8; }
        button:hover { opacity: 0.9; }
        h2 { color: #333; margin-top: 25px; }
    </style>
</head>
<body>

    <h1>Супер калькулятор</h1>
    
    <!-- 22 22 -->
    <input type="number" id="num1" placeholder="Число 1">
    <input type="number" id="num2" placeholder="Число 2">
    
    <!-- Кнопки для разных операций -->
    <div class="buttons">
        <button class="btn-plus" onclick="calculate('+')">+</button>
        <button class="btn-minus" onclick="calculate('-')">-</button>
        <button class="btn-multiply" onclick="calculate('*')">×</button>
        <button class="btn-divide" onclick="calculate('/')">÷</button>
    </div>

    <!-- Место для вывода результата -->
    <h2 id="result">Результат: </h2>

    <script>
        function calculate(operator) {
            // Забираем значения из полей ввода
            const value1 = Number(document.getElementById('num1').value);
            const value2 = Number(document.getElementById('num2').value);
            let res = 0;
            
            // Проверяем, какой знак был нажат
            if (operator === '+') {
                res = value1 + value2;
            } else if (operator === '-') {
                res = value1 - value2;
            } else if (operator === '*') {
                res = value1 * value2;
            } else if (operator === '/') {
                // Проверяем, чтобы не было деления на ноль
                if (value2 === 0) {
                    document.getElementById('result').innerText = "Ошибка: деление на ноль!";
                    return; // Останавливаем выполнение функции
                }
                res = value1 / value2;
            }
            
            // Выводим результат на экран
            document.getElementById('result').innerText = "Результат: " + res;
        }
    </script>

</body>
</html>
